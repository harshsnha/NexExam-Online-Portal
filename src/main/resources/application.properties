spring.application.name=Online-Exam-System
server.port=8081

spring.datasource.url=jdbc:h2:file:./data/examdb

spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=password

# --- H2 Console ---
# Enable H2 console to view your database in the browser
# Access it at: http://localhost:8081/h2-console
# http://localhost:8081/
# IMPORTANT: When logging in, you MUST change the JDBC URL to: jdbc:h2:file:./data/examdb
spring.h2.console.enabled=true


# JPA Configuration
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true



file.upload-dir=./uploads/