<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <style th:fragment="navbar-style">
        /* Modern Neon Glass Navbar */
        .navbar-custom {
            background: rgba(15, 23, 42, 0.8) !important; /* Matches --primary-bg */
            backdrop-filter: blur(12px) saturate(180%);
            -webkit-backdrop-filter: blur(12px) saturate(180%);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            padding: 0.8rem 1rem;
            transition: all 0.3s ease;
        }

        .navbar-brand {
            font-weight: 800 !important;
            letter-spacing: -0.5px;
            background: linear-gradient(to right, #fff, #38bdf8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .nav-link {
            color: #94a3b8 !important;
            font-weight: 500;
            margin: 0 5px;
            transition: all 0.3s ease !important;
            border-radius: 8px;
        }

        .nav-link:hover {
            color: #38bdf8 !important;
            background: rgba(56, 189, 248, 0.1);
        }

        .nav-link.active {
            color: #fff !important;
            background: rgba(255, 255, 255, 0.1);
        }

        /* Profile Section Styles */
        .navbar-profile-pic {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid #38bdf8;
            padding: 1px;
        }

        .dropdown-menu {
            background: rgba(30, 41, 59, 0.95) !important;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            margin-top: 10px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
        }

        .dropdown-item {
            color: #cbd5e1 !important;
            padding: 10px 20px;
            transition: 0.2s;
        }

        .dropdown-item:hover {
            background: rgba(56, 189, 248, 0.15) !important;
            color: #38bdf8 !important;
        }

        .role-badge {
            font-size: 10px;
            text-transform: uppercase;
            padding: 2px 8px;
            border-radius: 20px;
            margin-left: 5px;
            background: rgba(56, 189, 248, 0.2);
            color: #38bdf8;
            border: 1px solid rgba(56, 189, 248, 0.3);
        }
    </style>
</head>
<body>

<nav th:fragment="navbar" class="navbar navbar-expand-lg navbar-dark navbar-custom fixed-top">
    <div class="container">

        <a class="navbar-brand d-flex align-items-center" th:href="@{/}">
            <i class="bi bi-cpu-fill me-2" style="color: #38bdf8;"></i>
            NexExam
        </a>

        <button class="navbar-toggler border-0" type="button" data-bs-toggle="collapse" data-bs-target="#navbarContent">
            <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="navbarContent">
            <ul class="navbar-nav ms-auto align-items-center">

                <li class="nav-item">
                    <a class="nav-link" th:href="@{/}"><i class="bi bi-house-door me-1"></i> Home</a>
                </li>

                <th:block sec:authorize="hasRole('ADMIN')">
                    <li class="nav-item">
                        <a class="nav-link" th:href="@{/admin/dashboard}"><i class="bi bi-speedometer2 me-1"></i> Dashboard</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" th:href="@{/admin/manage-exams}"><i class="bi bi-journal-text me-1"></i> Exams</a>
                    </li>
                </th:block>

                <th:block sec:authorize="hasRole('STUDENT')">
                    <li class="nav-item">
                        <a class="nav-link" th:href="@{/student/dashboard}"><i class="bi bi-grid-1x2 me-1"></i> My Exams</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" th:href="@{/student/my-results}"><i class="bi bi-trophy me-1"></i> Results</a>
                    </li>
                </th:block>

                <li class="nav-item" sec:authorize="!isAuthenticated()">
                    <a class="nav-link" th:href="@{/login}">Login</a>
                </li>
                <li class="nav-item ms-lg-2" sec:authorize="!isAuthenticated()">
                    <a class="nav-link btn btn-primary text-white px-3" th:href="@{/register}"
                       style="background: #38bdf8; border: none; color: #0f172a !important;">Join Now</a>
                </li>

                <li class="nav-item dropdown ms-lg-3" sec:authorize="isAuthenticated()">
                    <a class="nav-link dropdown-toggle d-flex align-items-center" href="#" role="button" data-bs-toggle="dropdown">

                        <img th:if="${globalProfilePicUrl != null}" th:src="@{${globalProfilePicUrl}}" class="navbar-profile-pic me-2">

                        <div th:if="${globalProfilePicUrl == null}" class="me-2 d-inline-block">
                            <i class="bi bi-person-circle fs-5"></i>
                        </div>

                        <div class="d-flex flex-column align-items-start">
                            <span class="text-white small fw-bold" sec:authentication="name" style="line-height: 1;">Username</span>
                            <span class="role-badge" sec:authorize="hasRole('ADMIN')">Admin</span>
                            <span class="role-badge" sec:authorize="hasRole('STUDENT')">Student</span>
                        </div>
                    </a>

                    <ul class="dropdown-menu dropdown-menu-end mt-2 animate slideIn">
                        <li><a class="dropdown-item" th:href="@{/student/profile}" sec:authorize="hasRole('STUDENT')">
                            <i class="bi bi-person me-2"></i> My Profile</a>
                        </li>
                        <li><hr class="dropdown-divider border-secondary opacity-25"></li>
                        <li>
                            <a class="dropdown-item text-danger" href="javascript:document.getElementById('logoutForm').submit();">
                                <i class="bi bi-box-arrow-right me-2"></i> Logout
                            </a>
                            <form th:action="@{/logout}" method="post" id="logoutForm" class="d-none"></form>
                        </li>
                    </ul>
                </li>

            </ul>
        </div>
    </div>
</nav>

</body>
</html>
