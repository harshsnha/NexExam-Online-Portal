<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Exam - NexExam Admin</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">

    <style>
        /* --- UNIVERSAL THEME ENGINE --- */
        :root {
            --primary-bg: #0f172a;
            --accent-color: #38bdf8;
            --text-main: #f8fafc;
            --text-sec: #94a3b8;
            --glass-bg: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
            --input-bg: rgba(255, 255, 255, 0.03);
        }

        [data-bs-theme="light"] {
            --primary-bg: #f8fafc;
            --accent-color: #0284c7;
            --text-main: #1e293b;
            --text-sec: #64748b;
            --glass-bg: rgba(255, 255, 255, 0.85);
            --glass-border: rgba(15, 23, 42, 0.1);
            --input-bg: rgba(15, 23, 42, 0.03);
        }

        body {
            background-color: var(--primary-bg);
            font-family: 'Plus Jakarta Sans', sans-serif;
            color: var(--text-main);
            min-height: 100vh;
            transition: all 0.4s ease;
        }

        /* Animated Background Orbs */
        .orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(100px);
            z-index: -1;
            opacity: 0.15;
        }
        .orb-1 { width: 350px; height: 350px; background: #a855f7; top: -50px; left: -50px; }
        .orb-2 { width: 300px; height: 300px; background: var(--accent-color); bottom: -50px; right: -50px; }

        .form-container {
            padding-top: 100px;
            padding-bottom: 50px;
        }

        .glass-card {
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 28px;
            padding: 3rem;
            color: var(--text-main);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.2);
        }

        .form-label {
            font-weight: 600;
            color: var(--text-sec);
            margin-bottom: 0.7rem;
            font-size: 0.9rem;
        }

        .form-control {
            background: var(--input-bg);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            color: var(--text-main) !important;
            padding: 0.8rem 1.2rem;
            transition: 0.3s;
        }

        .form-control:focus {
            background: rgba(56, 189, 248, 0.05);
            border-color: var(--accent-color);
            box-shadow: 0 0 0 4px rgba(56, 189, 248, 0.15);
        }

        .input-group-text {
            background: var(--input-bg) !important;
            border: 1px solid var(--glass-border) !important;
            color: var(--text-sec);
            border-radius: 12px 0 0 12px !important;
        }

        .btn-update {
            background: var(--accent-color);
            color: white;
            border: none;
            border-radius: 12px;
            padding: 0.8rem 1.5rem;
            font-weight: 800;
            transition: 0.3s;
        }

        .btn-update:hover {
            background: var(--text-main);
            color: var(--primary-bg);
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(56, 189, 248, 0.3);
        }

        .btn-cancel {
            background: var(--input-bg);
            color: var(--text-main);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            padding: 0.8rem 1.5rem;
            font-weight: 600;
            transition: 0.3s;
        }

        .btn-cancel:hover {
            background: var(--text-main);
            color: var(--primary-bg);
        }

        .header-icon {
            width: 50px;
            height: 50px;
            background: rgba(168, 85, 247, 0.1);
            color: #a855f7;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            margin-bottom: 1.5rem;
        }
    </style>
</head>
<body>

<div class="orb orb-1"></div>
<div class="orb orb-2"></div>

<div th:replace="~{fragments :: navbar}"></div>

<div class="container form-container">
    <div class="row justify-content-center">
        <div class="col-lg-7">
            <div class="glass-card">
                <div class="header-icon">
                    <i class="bi bi-pencil-square"></i>
                </div>

                <h2 class="fw-bold mb-1">Edit <span style="color: var(--accent-color);">Exam Configuration</span></h2>
                <p class="text-secondary mb-5">Update the parameters for this exam session. All changes are immediate.</p>

                <form th:action="@{/admin/exam/update/{id}(id=${exam.id})}" th:object="${exam}" method="post">

                    <div class="mb-4">
                        <label for="title" class="form-label">Exam Title</label>
                        <div class="input-group">
                            <span class="input-group-text border-end-0">
                                <i class="bi bi-type"></i>
                            </span>
                            <input type="text" class="form-control border-start-0" id="title" th:field="*{title}" placeholder="Enter exam title" required>
                        </div>
                    </div>

                    <div class="mb-5">
                        <label for="duration" class="form-label">Time Duration (Minutes)</label>
                        <div class="input-group">
                            <span class="input-group-text border-end-0">
                                <i class="bi bi-stopwatch"></i>
                            </span>
                            <input type="number" class="form-control border-start-0" id="duration" th:field="*{durationInMinutes}" min="1" placeholder="e.g. 45" required>
                        </div>
                        <div class="form-text text-secondary small">Total time available for students to complete the test.</div>
                    </div>

                    <div class="d-flex gap-3 justify-content-end">
                        <a th:href="@{/admin/manage-exams}" class="btn btn-cancel text-decoration-none">
                            <i class="bi bi-x-lg me-2"></i>Cancel
                        </a>
                        <button type="submit" class="btn btn-update">
                            <i class="bi bi-cloud-arrow-up me-2"></i>Update Exam
                        </button>
                    </div>
                </form>
            </div>

            <div class="text-center mt-4">
                <p class="small text-secondary">
                    Need to modify questions?
                    <a th:href="@{/admin/exam/manage-questions/{id}(id=${exam.id})}" class="text-decoration-none fw-bold" style="color: var(--accent-color);">
                        Go to Question Manager <i class="bi bi-arrow-right"></i>
                    </a>
                </p>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script>
    // Initialize Theme
    document.addEventListener('DOMContentLoaded', () => {
        const savedTheme = localStorage.getItem('theme') || 'dark';
        document.documentElement.setAttribute('data-bs-theme', savedTheme);
    });
</script>
</body>
</html>
