<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Question - NexExam</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">

    <style>
        /* --- THEME ENGINE --- */
        :root {
            --primary-bg: #0f172a;
            --accent-color: #38bdf8;
            --text-main: #f8fafc;
            --text-sec: #94a3b8;
            --glass-bg: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
            --input-bg: rgba(255, 255, 255, 0.03);
            --option-bg: #1e293b; /* Dark mode dropdown background */
        }

        [data-bs-theme="light"] {
            --primary-bg: #f8fafc;
            --accent-color: #0284c7;
            --text-main: #1e293b;
            --text-sec: #64748b;
            --glass-bg: rgba(255, 255, 255, 0.85);
            --glass-border: rgba(15, 23, 42, 0.1);
            --input-bg: rgba(15, 23, 42, 0.03);
            --option-bg: #ffffff; /* Light mode dropdown background */
        }

        body {
            background-color: var(--primary-bg);
            font-family: 'Plus Jakarta Sans', sans-serif;
            color: var(--text-main);
            min-height: 100vh;
            transition: all 0.4s ease;
        }

        .main-container { padding-top: 110px; padding-bottom: 50px; }

        .glass-card {
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 28px;
            padding: 2.5rem;
            color: var(--text-main);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.2);
        }

        /* --- DROPDOWN VISIBILITY FIX --- */
        .form-select option {
            background-color: var(--option-bg);
            color: var(--text-main);
        }

        .form-label { font-weight: 600; color: var(--text-sec); font-size: 0.85rem; margin-bottom: 0.5rem; }

        .form-control, .form-select {
            background: var(--input-bg);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            color: var(--text-main) !important;
            padding: 0.75rem 1rem;
            transition: 0.3s;
        }

        .form-control:focus, .form-select:focus {
            background: rgba(56, 189, 248, 0.05);
            border-color: var(--accent-color);
            box-shadow: 0 0 0 4px rgba(56, 189, 248, 0.15);
        }

        .option-group { position: relative; }
        .option-badge {
            position: absolute; right: 15px; top: 40px;
            font-size: 0.7rem; color: var(--accent-color);
            font-weight: bold; opacity: 0.7;
        }

        .btn-add {
            background: var(--accent-color);
            color: white; border: none; border-radius: 12px;
            padding: 0.8rem 2rem; font-weight: 800;
            transition: 0.3s; width: 100%;
            text-transform: uppercase;
        }

        .btn-add:hover { background: var(--text-main); color: var(--primary-bg); transform: translateY(-2px); }

        .step-indicator {
            display: inline-flex; align-items: center;
            background: rgba(16, 185, 129, 0.1);
            color: #10b981; padding: 5px 15px;
            border-radius: 50px; font-size: 0.8rem;
            font-weight: bold; margin-bottom: 1.5rem;
        }

        .btn-manage {
            border: 1px solid var(--glass-border);
            background: var(--input-bg);
            color: var(--text-main);
            border-radius: 10px;
            padding: 8px 15px;
            text-decoration: none;
            font-size: 0.9rem;
            transition: 0.3s;
        }
        .btn-manage:hover { background: var(--text-main); color: var(--primary-bg); }

        .input-group-text {
            background: var(--input-bg) !important;
            border: 1px solid var(--glass-border) !important;
            color: var(--text-sec);
            border-radius: 12px 0 0 12px !important;
        }
    </style>
</head>
<body>

<div th:replace="~{fragments :: navbar}"></div>

<main class="container main-container">
    <div class="row">
        <div class="col-lg-8 offset-lg-2">

            <div class="glass-card">
                <div class="d-flex justify-content-between align-items-start mb-4">
                    <div>
                        <div class="step-indicator">
                            <i class="bi bi-check2-circle me-2"></i> Step 2: Adding Content
                        </div>
                        <h2 class="fw-bold">Add <span style="color: var(--accent-color);">Question</span></h2>
                        <p class="text-secondary small">Exam ID: <span class="fw-bold" style="color: var(--text-main);" th:text="${examId}">1</span></p>
                    </div>
                    <a th:href="@{/admin/exam/manage-questions/{id}(id=${examId})}" class="btn-manage">
                        <i class="bi bi-list-task me-1"></i> Manage Questions
                    </a>
                </div>

                <div th:if="${successMessage}" class="alert alert-success alert-dismissible fade show border-0 bg-success bg-opacity-10 text-success mb-4 rounded-4" role="alert">
                    <i class="bi bi-check-circle-fill me-2"></i> <span th:text="${successMessage}"></span>
                    <button type="button" class="btn-close shadow-none" data-bs-dismiss="alert"></button>
                </div>

                <form th:action="@{/admin/exam/question/add}" th:object="${question}" method="post">
                    <input type="hidden" name="examId" th:value="${examId}" />

                    <div class="mb-4">
                        <label for="text" class="form-label">Question Text / Statement</label>
                        <textarea class="form-control" id="text" th:field="*{text}" rows="3" placeholder="Enter your question statement..." required></textarea>
                    </div>

                    <div class="row">
                        <div class="col-md-6 mb-3 option-group">
                            <label for="option1" class="form-label">Option 1</label>
                            <input type="text" class="form-control" id="option1" th:field="*{option1}" placeholder="Value for choice 1" required>
                            <span class="option-badge">CHOICE A</span>
                        </div>
                        <div class="col-md-6 mb-3 option-group">
                            <label for="option2" class="form-label">Option 2</label>
                            <input type="text" class="form-control" id="option2" th:field="*{option2}" placeholder="Value for choice 2" required>
                            <span class="option-badge">CHOICE B</span>
                        </div>
                    </div>

                    <div class="row">
                        <div class="col-md-6 mb-3 option-group">
                            <label for="option3" class="form-label">Option 3</label>
                            <input type="text" class="form-control" id="option3" th:field="*{option3}" placeholder="Value for choice 3" required>
                            <span class="option-badge">CHOICE C</span>
                        </div>
                        <div class="col-md-6 mb-3 option-group">
                            <label for="option4" class="form-label">Option 4</label>
                            <input type="text" class="form-control" id="option4" th:field="*{option4}" placeholder="Value for choice 4" required>
                            <span class="option-badge">CHOICE D</span>
                        </div>
                    </div>

                    <hr class="my-4 opacity-10">

                    <div class="row align-items-end">
                        <div class="col-md-6 mb-3">
                            <label for="correctAnswer" class="form-label">Correct Option (Choice)</label>
                            <select class="form-select" id="correctAnswer" th:field="*{correctAnswer}" required>
                                <option value="" selected disabled>Choose Answer</option>
                                <option value="1">Option 1 (Choice A)</option>
                                <option value="2">Option 2 (Choice B)</option>
                                <option value="3">Option 3 (Choice C)</option>
                                <option value="4">Option 4 (Choice D)</option>
                            </select>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label for="marks" class="form-label">Weightage (Marks)</label>
                            <div class="input-group">
                                <span class="input-group-text border-end-0">
                                    <i class="bi bi-star-fill text-warning"></i>
                                </span>
                                <input type="number" class="form-control border-start-0" id="marks" th:field="*{marks}" min="1" placeholder="e.g. 5" required>
                            </div>
                        </div>
                    </div>

                    <div class="mt-4">
                        <button type="submit" class="btn btn-add">
                            Save and Add Next <i class="bi bi-plus-lg ms-2"></i>
                        </button>
                    </div>
                </form>
            </div>

            <div class="text-center mt-4">
                <a th:href="@{/admin/dashboard}" class="text-decoration-none small" style="color: var(--text-sec);">
                    <i class="bi bi-arrow-left me-1"></i> Back to Dashboard
                </a>
            </div>
        </div>
    </div>
</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script>
    document.addEventListener('DOMContentLoaded', () => {
        const savedTheme = localStorage.getItem('theme') || 'dark';
        document.documentElement.setAttribute('data-bs-theme', savedTheme);
    });
</script>
</body>
</html>
