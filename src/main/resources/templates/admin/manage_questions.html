<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NexExam - Question Manager</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">

    <style>
        /* --- UNIVERSAL THEME ENGINE --- */
        :root {
            --primary-bg: #0f172a;
            --accent-color: #38bdf8;
            --text-main: #f8fafc;
            --text-sec: #94a3b8;
            --glass-bg: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
            --table-header: rgba(255, 255, 255, 0.03);
            --row-hover: rgba(56, 189, 248, 0.05);
        }

        [data-bs-theme="light"] {
            --primary-bg: #f8fafc;
            --accent-color: #0284c7;
            --text-main: #1e293b;
            --text-sec: #64748b;
            --glass-bg: rgba(255, 255, 255, 0.85);
            --glass-border: rgba(15, 23, 42, 0.1);
            --table-header: rgba(15, 23, 42, 0.05);
            --row-hover: rgba(2, 132, 199, 0.05);
        }

        body {
            background-color: var(--primary-bg);
            font-family: 'Plus Jakarta Sans', sans-serif;
            color: var(--text-main);
            min-height: 100vh;
            transition: all 0.4s ease;
        }

        .main-container { padding-top: 100px; padding-bottom: 50px; }

        /* Glass Panel */
        .glass-panel {
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 2rem;
            color: var(--text-main);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.2);
        }

        .table { color: var(--text-main) !important; }

        .table thead th {
            background: var(--table-header);
            color: var(--text-sec);
            font-weight: 700;
            text-transform: uppercase;
            font-size: 0.75rem;
            letter-spacing: 1px;
            border: none;
            padding: 15px;
        }

        .table tbody tr {
            transition: 0.3s;
            border-bottom: 1px solid var(--glass-border);
        }

        .table tbody tr:hover { background: var(--row-hover) !important; }

        .question-text {
            max-width: 400px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            color: var(--text-main);
            opacity: 0.9;
        }

        /* Badges */
        .marks-badge {
            background: rgba(56, 189, 248, 0.15);
            color: var(--accent-color);
            padding: 5px 12px; border-radius: 8px; font-weight: 700;
        }

        .ans-badge {
            background: rgba(16, 185, 129, 0.15);
            color: #10b981;
            padding: 5px 12px; border-radius: 8px; font-weight: 700;
        }

        /* Action Buttons */
        .btn-action {
            width: 35px; height: 35px;
            display: inline-flex; align-items: center; justify-content: center;
            border-radius: 8px; transition: 0.3s; text-decoration: none;
            border: 1px solid var(--glass-border);
        }

        .btn-edit-q { background: rgba(245, 158, 11, 0.15); color: #f59e0b; }
        .btn-delete-q { background: rgba(239, 68, 68, 0.15); color: #ef4444; }

        .btn-action:hover { transform: translateY(-2px); filter: brightness(1.1); }

        .btn-primary-custom {
            background: var(--accent-color);
            color: white;
            font-weight: 700; border-radius: 12px;
            padding: 10px 20px; border: none; transition: 0.3s;
        }

        .btn-primary-custom:hover { background: var(--text-main); color: var(--primary-bg); transform: scale(1.05); }

        .btn-return {
            border: 1px solid var(--glass-border);
            color: var(--text-main);
            background: var(--glass-bg);
            transition: 0.3s;
        }
        .btn-return:hover { background: var(--text-main); color: var(--primary-bg); }

        .text-secondary { color: var(--text-sec) !important; }
    </style>
</head>
<body>

<div th:replace="~{fragments :: navbar}"></div>

<main class="container main-container">

    <div th:if="${errorMessage}" class="alert alert-danger alert-dismissible fade show border-0 bg-danger bg-opacity-10 text-danger mb-4 rounded-4" role="alert">
        <i class="bi bi-exclamation-octagon-fill me-2"></i> <strong>Error:</strong> <span th:text="${errorMessage}"></span>
        <button type="button" class="btn-close shadow-none" data-bs-dismiss="alert"></button>
    </div>

    <div th:if="${successMessage}" class="alert alert-success alert-dismissible fade show border-0 bg-success bg-opacity-10 text-success mb-4 rounded-4" role="alert">
        <i class="bi bi-check-circle-fill me-2"></i> <span th:text="${successMessage}"></span>
        <button type="button" class="btn-close shadow-none" data-bs-dismiss="alert"></button>
    </div>

    <div class="d-flex justify-content-between align-items-center mb-4 px-2">
        <div>
            <h2 class="fw-bold mb-1">Question <span style="color: var(--accent-color);">Manager</span></h2>
            <p class="text-secondary small mb-0">Exam: <span class="fw-bold text-main" th:text="${exam.title}">Sample Title</span></p>
        </div>
        <a th:href="@{/admin/exam/{id}/question/add(id=${exam.id})}" class="btn btn-primary-custom">
            <i class="bi bi-plus-circle me-2"></i>New Question
        </a>
    </div>

    <div class="glass-panel">
        <div class="table-responsive">
            <table class="table align-middle">
                <thead>
                <tr>
                    <th style="width: 45%;">Question Detail</th>
                    <th>Points</th>
                    <th>Key (Option)</th>
                    <th class="text-center">Action</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="q : ${questions}">
                    <td>
                        <div class="question-text fw-semibold" th:title="${q.text}" th:text="${q.text}">
                            This is a sample question...
                        </div>
                    </td>
                    <td>
                        <span class="marks-badge"><i class="bi bi-star-fill me-1 small"></i> <span th:text="${q.marks}">5</span></span>
                    </td>
                    <td>
                        <span class="ans-badge">Opt: <span th:text="${q.correctAnswer}">1</span></span>
                    </td>
                    <td class="text-center">
                        <a th:href="@{/admin/question/edit/{id}(id=${q.id})}"
                           class="btn-action btn-edit-q me-2" title="Edit Content">
                            <i class="bi bi-pencil-square"></i>
                        </a>

                        <a th:href="@{/admin/exam/{examId}/question/delete/{qId}(examId=${exam.id}, qId=${q.id})}"
                           class="btn-action btn-delete-q" title="Remove Question"
                           onclick="return confirm('Do you really want to remove this question? This cannot be undone.');">
                            <i class="bi bi-trash3-fill"></i>
                        </a>
                    </td>
                </tr>

                <tr th:if="${#lists.isEmpty(questions)}">
                    <td colspan="4" class="text-center py-5">
                        <p class="text-secondary fst-italic">No questions added yet. Start by clicking "New Question".</p>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>

    <div class="mt-5">
        <a th:href="@{/admin/manage-exams}" class="btn btn-return rounded-pill px-4">
            <i class="bi bi-arrow-left me-2"></i>Return to Exams
        </a>
    </div>
</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script>
    // Initialize Theme
    document.addEventListener('DOMContentLoaded', () => {
        const savedTheme = localStorage.getItem('theme') || 'dark';
        document.documentElement.setAttribute('data-bs-theme', savedTheme);
    });
</script>
</body>
</html>
