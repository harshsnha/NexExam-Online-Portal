<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Exams - NexExam Admin</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">

    <style>
        :root {
            --primary-bg: #0f172a;
            --accent-color: #38bdf8;
            --text-main: #f8fafc;
            --text-sec: #94a3b8;
            --glass-bg: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
            --table-header: rgba(255, 255, 255, 0.03);
            --row-hover: rgba(56, 189, 248, 0.08);
        }

        [data-bs-theme="light"] {
            --primary-bg: #f8fafc;
            --accent-color: #0284c7;
            --text-main: #1e293b;
            --text-sec: #64748b;
            --glass-bg: rgba(255, 255, 255, 0.85);
            --glass-border: rgba(15, 23, 42, 0.1);
            --table-header: rgba(15, 23, 42, 0.05);
            --row-hover: rgba(2, 132, 199, 0.05);
        }

        body { background-color: var(--primary-bg); font-family: 'Plus Jakarta Sans', sans-serif; color: var(--text-main); min-height: 100vh; transition: all 0.4s ease; }
        .main-container { padding-top: 100px; padding-bottom: 50px; }

        .glass-panel { background: var(--glass-bg); backdrop-filter: blur(20px); border: 1px solid var(--glass-border); border-radius: 24px; padding: 2rem; box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.2); }

        .table { color: var(--text-main) !important; border-collapse: separate; border-spacing: 0 8px; }
        .table thead th { background: transparent; color: var(--accent-color); font-weight: 700; text-transform: uppercase; font-size: 0.75rem; letter-spacing: 1px; border: none; padding: 15px; }

        .table tbody tr { background: transparent !important; transition: all 0.3s ease; }
        .table td { padding: 18px 15px; vertical-align: middle; background: transparent !important; border-top: 1px solid var(--glass-border) !important; border-bottom: 1px solid var(--glass-border) !important; }

        .table tbody tr td:first-child { border-left: 1px solid var(--glass-border) !important; border-radius: 12px 0 0 12px; }
        .table tbody tr td:last-child { border-right: 1px solid var(--glass-border) !important; border-radius: 0 12px 12px 0; }

        .table tbody tr:hover { background: var(--row-hover) !important; transform: scale(1.005); }

        .btn-action { width: 38px; height: 38px; display: inline-flex; align-items: center; justify-content: center; border-radius: 10px; margin: 0 2px; transition: 0.3s; border: 1px solid var(--glass-border); text-decoration: none; }
        .btn-add-qs { background: rgba(16, 185, 129, 0.15); color: #10b981; }
        .btn-results { background: rgba(56, 189, 248, 0.15); color: #38bdf8; }
        .btn-manage { background: rgba(148, 163, 184, 0.15); color: var(--text-sec); }
        .btn-edit { background: rgba(245, 158, 11, 0.15); color: #f59e0b; }
        .btn-delete { background: rgba(239, 68, 68, 0.15); color: #ef4444; }

        .badge-count { background: rgba(56, 189, 248, 0.1); color: var(--accent-color); padding: 5px 12px; border-radius: 8px; font-weight: 700; font-size: 0.8rem; }
        .btn-create-new { background: var(--accent-color); color: white; font-weight: 800; border-radius: 12px; padding: 10px 20px; border: none; transition: 0.3s; }
        .orb { position: absolute; width: 400px; height: 400px; border-radius: 50%; filter: blur(100px); z-index: -1; opacity: 0.15; }
    </style>
</head>
<body>

<div class="orb" style="background: var(--accent-color); top: 0; right: 0;"></div>
<div th:replace="~{fragments :: navbar}"></div>

<main class="container main-container">
    <div class="d-flex justify-content-between align-items-end mb-4 px-2">
        <div>
            <h2 class="fw-bold mb-1">Manage <span style="color: var(--accent-color);">Exams</span></h2>
            <p class="text-secondary small mb-0">Total active exam sessions available in the system.</p>
        </div>
        <a th:href="@{/admin/exam/add}" class="btn btn-create-new">
            <i class="bi bi-plus-lg me-2"></i>Create New Exam
        </a>
    </div>

    <div class="glass-panel">
        <div class="table-responsive">
            <table class="table align-middle">
                <thead>
                <tr>
                    <th style="width: 80px;">S.N.</th>
                    <th>Exam Title</th>
                    <th>Duration</th>
                    <th>Questions</th>
                    <th class="text-center">Operations</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="exam, iterStat : ${exams}">
                    <td class="fw-bold text-info" style="padding-left: 20px;" th:text="${iterStat.count}">1</td>
                    <td>
                        <div class="fw-bold" th:text="${exam.title}">Sample Exam Title</div>
                        <small class="text-secondary opacity-75">Exam ID: <span th:text="${exam.id}"></span></small>
                    </td>
                    <td>
                        <span class="text-secondary" th:text="${exam.durationInMinutes} + ' Mins'">60 Mins</span>
                    </td>
                    <td>
                        <span class="badge-count" th:text="${#lists.size(exam.questions)}">10</span>
                    </td>
                    <td class="text-center">
                        <a th:href="@{/admin/exam/{examId}/question/add(examId=${exam.id})}" class="btn-action btn-add-qs" title="Add Question"><i class="bi bi-plus-circle"></i></a>
                        <a th:href="@{/admin/results/{examId}(examId=${exam.id})}" class="btn-action btn-results" title="Results"><i class="bi bi-bar-chart-line"></i></a>
                        <a th:href="@{/admin/exam/manage-questions/{examId}(examId=${exam.id})}" class="btn-action btn-manage" title="Questions List"><i class="bi bi-layers"></i></a>
                        <a th:href="@{/admin/exam/edit/{examId}(examId=${exam.id})}" class="btn-action btn-edit" title="Edit Exam"><i class="bi bi-pencil-square"></i></a>
                        <a th:href="@{/admin/exam/delete/{examId}(examId=${exam.id})}" class="btn-action btn-delete" title="Delete" onclick="return confirm('Pakka delete karna hai?');"><i class="bi bi-trash3"></i></a>
                    </td>
                </tr>

                <tr th:if="${#lists.isEmpty(exams)}">
                    <td colspan="5" class="text-center py-5">
                        <i class="bi bi-inbox text-secondary fs-1 d-block mb-3"></i>
                        <p class="text-secondary fst-italic">No exams found in the database.</p>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>
</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script>
    document.addEventListener('DOMContentLoaded', () => {
        const savedTheme = localStorage.getItem('theme') || 'dark';
        document.documentElement.setAttribute('data-bs-theme', savedTheme);
    });
</script>
</body>
</html>
