<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NexExam - Create New Exam</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">

    <style>
        /* --- THEME ENGINE --- */
        :root {
            --primary-bg: #0f172a;
            --accent-color: #38bdf8;
            --text-main: #f8fafc;
            --text-sec: #94a3b8;
            --glass-bg: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
            --input-bg: rgba(255, 255, 255, 0.03);
        }

        [data-bs-theme="light"] {
            --primary-bg: #f8fafc;
            --accent-color: #0284c7;
            --text-main: #1e293b;
            --text-sec: #64748b;
            --glass-bg: rgba(255, 255, 255, 0.85);
            --glass-border: rgba(15, 23, 42, 0.1);
            --input-bg: rgba(15, 23, 42, 0.03);
        }

        body {
            background-color: var(--primary-bg);
            font-family: 'Plus Jakarta Sans', sans-serif;
            color: var(--text-main);
            min-height: 100vh;
            transition: all 0.4s ease;
        }

        .orb {
            position: absolute; border-radius: 50%; filter: blur(100px); z-index: -1; opacity: 0.15;
        }
        .orb-1 { width: 400px; height: 400px; background: var(--accent-color); top: -100px; right: -50px; }

        .form-container { padding-top: 110px; padding-bottom: 50px; }

        .glass-card {
            background: var(--glass-bg);
            backdrop-filter: blur(15px);
            border: 1px solid var(--glass-border);
            border-radius: 28px;
            padding: 3rem;
            color: var(--text-main);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.2);
        }

        .form-label { font-weight: 600; color: var(--text-sec); margin-bottom: 0.7rem; font-size: 0.9rem; }

        .form-control {
            background: var(--input-bg);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            color: var(--text-main) !important;
            padding: 0.8rem 1.2rem;
            transition: 0.3s;
        }

        .form-control:focus {
            background: rgba(56, 189, 248, 0.05);
            border-color: var(--accent-color);
            box-shadow: 0 0 0 4px rgba(56, 189, 248, 0.15);
        }

        .input-group-text {
            background: var(--input-bg) !important;
            border: 1px solid var(--glass-border) !important;
            color: var(--text-sec);
            border-radius: 12px 0 0 12px !important;
        }

        .btn-create {
            background: var(--accent-color);
            color: white;
            border: none;
            border-radius: 12px;
            padding: 1rem;
            font-weight: 800;
            width: 100%;
            transition: 0.3s;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-top: 1.5rem;
        }

        .btn-create:hover { background: var(--text-main); color: var(--primary-bg); transform: translateY(-3px); }

        .step-indicator {
            display: flex; align-items: center; margin-bottom: 2rem;
            background: rgba(56, 189, 248, 0.1);
            padding: 10px 20px; border-radius: 50px; width: fit-content;
        }

        .text-secondary { color: var(--text-sec) !important; }
    </style>
</head>
<body>

<div class="orb orb-1"></div>

<div th:replace="~{fragments :: navbar}"></div>

<div class="container form-container">
    <div class="row">
        <div class="col-lg-6 offset-lg-3">
            <div class="glass-card">
                <div class="step-indicator">
                    <span class="badge rounded-circle me-2" style="background: var(--accent-color);">1</span>
                    <small class="fw-bold" style="color: var(--accent-color);">Step 1: Exam Details</small>
                </div>

                <h2 class="fw-bold mb-4">Create New <span style="color: var(--accent-color);">Exam</span></h2>
                <p class="text-secondary mb-5">Fill in the basic details to initialize the exam session.</p>

                <form th:action="@{/admin/exam/add}" th:object="${exam}" method="post">
                    <div class="mb-4">
                        <label for="title" class="form-label">Exam Title</label>
                        <div class="input-group">
                            <span class="input-group-text border-end-0">
                                <i class="bi bi-journal-text"></i>
                            </span>
                            <input type="text" class="form-control border-start-0" id="title" th:field="*{title}" placeholder="e.g. Java Fundamentals" required>
                        </div>
                    </div>

                    <div class="mb-4">
                        <label for="duration" class="form-label">Duration (in minutes)</label>
                        <div class="input-group">
                            <span class="input-group-text border-end-0">
                                <i class="bi bi-clock"></i>
                            </span>
                            <input type="number" class="form-control border-start-0" id="duration" th:field="*{durationInMinutes}" placeholder="60" required min="1">
                        </div>
                        <div class="form-text text-secondary small">Total time allowed for candidates.</div>
                    </div>

                    <button type="submit" class="btn btn-create">
                        Continue to Questions <i class="bi bi-arrow-right ms-2"></i>
                    </button>

                    <div class="text-center mt-4">
                        <a th:href="@{/admin/dashboard}" class="text-secondary text-decoration-none small">
                            <i class="bi bi-x-circle me-1"></i> Cancel and return
                        </a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script>
    // Initialize Theme
    document.addEventListener('DOMContentLoaded', () => {
        const savedTheme = localStorage.getItem('theme') || 'dark';
        document.documentElement.setAttribute('data-bs-theme', savedTheme);
    });
</script>
</body>
</html>
