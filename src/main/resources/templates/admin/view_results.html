<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exam Analytics - NexExam Admin</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">

    <style>
        :root {
            --primary-bg: #0f172a;
            --accent-color: #38bdf8;
            --text-main: #f8fafc;
            --text-sec: #94a3b8;
            --glass-bg: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        [data-bs-theme="light"] {
            --primary-bg: #f8fafc;
            --accent-color: #0284c7;
            --text-main: #1e293b;
            --text-sec: #64748b;
            --glass-bg: rgba(255, 255, 255, 0.85);
            --glass-border: rgba(15, 23, 42, 0.1);
        }

        body {
            background-color: var(--primary-bg);
            font-family: 'Plus Jakarta Sans', sans-serif;
            color: var(--text-main);
            min-height: 100vh;
            transition: all 0.4s ease;
        }

        .main-container { padding-top: 100px; padding-bottom: 50px; }

        .glass-panel {
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 2rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.2);
        }

        /* --- FINAL TABLE FIX --- */
        .table {
            color: var(--text-main) !important;
            border-collapse: separate;
            border-spacing: 0 10px;
        }

        .table thead th {
            background: transparent;
            color: var(--text-sec);
            font-weight: 700;
            text-transform: uppercase;
            font-size: 0.75rem;
            padding: 15px;
            border: none;
        }

        .table tbody tr {
            background: transparent !important; /* Transparency fix */
            transition: 0.3s;
        }

        .table td {
            padding: 18px 15px;
            background: transparent !important;
            border-top: 1px solid var(--glass-border) !important;
            border-bottom: 1px solid var(--glass-border) !important;
        }

        .table tbody tr td:first-child { border-left: 1px solid var(--glass-border) !important; border-radius: 16px 0 0 16px; }
        .table tbody tr td:last-child { border-right: 1px solid var(--glass-border) !important; border-radius: 0 16px 16px 0; }

        .table tbody tr:hover {
            background: rgba(56, 189, 248, 0.08) !important;
            transform: scale(1.01);
        }

        /* Time Badge Style */
        .time-badge {
            background: rgba(56, 189, 248, 0.1);
            color: var(--accent-color);
            padding: 6px 12px;
            border-radius: 10px;
            font-family: monospace;
            font-weight: 700;
            border: 1px solid rgba(56, 189, 248, 0.2);
        }

        .score-pill { padding: 6px 14px; border-radius: 50px; font-weight: 800; font-size: 0.85rem; display: inline-block; }
        .pill-pass { background: rgba(16, 185, 129, 0.15); color: #10b981; border: 1px solid rgba(16, 185, 129, 0.3); }
        .pill-fail { background: rgba(239, 68, 68, 0.15); color: #ef4444; border: 1px solid rgba(239, 68, 68, 0.3); }

        .raw-score { font-family: monospace; font-size: 1.1rem; color: var(--accent-color); }
        .header-icon { width: 60px; height: 60px; background: rgba(56, 189, 248, 0.1); color: var(--accent-color); border-radius: 16px; display: flex; align-items: center; justify-content: center; font-size: 2rem; margin-right: 1.5rem; }

        .btn-return { background: var(--glass-bg); color: var(--text-main); border: 1px solid var(--glass-border); border-radius: 12px; padding: 10px 20px; transition: 0.3s; text-decoration: none; }
        .btn-return:hover { background: var(--text-main); color: var(--primary-bg); }

        .orb { position: absolute; width: 400px; height: 400px; border-radius: 50%; filter: blur(100px); z-index: -1; opacity: 0.15; }
    </style>
</head>
<body>

<div class="orb" style="background: var(--accent-color); top: 0; right: 0;"></div>
<div class="orb" style="background: #a855f7; bottom: 0; left: 0;"></div>

<div th:replace="~{fragments :: navbar}"></div>

<main class="container main-container">
    <div class="d-flex align-items-center mb-5">
        <div class="header-icon"><i class="bi bi-trophy-fill"></i></div>
        <div>
            <h2 class="fw-bold mb-0">Exam <span style="color: var(--accent-color);">Analytics</span></h2>
            <p class="text-secondary mb-0" th:text="${exam.title}">Exam Results</p>
        </div>
    </div>

    <div class="glass-panel">
        <div th:if="${#lists.isEmpty(results)}" class="text-center py-5">
            <i class="bi bi-clipboard-x text-secondary fs-1 d-block mb-3"></i>
            <h5 class="text-secondary">No submissions recorded yet.</h5>
        </div>

        <div th:unless="${#lists.isEmpty(results)}" class="table-responsive">
            <table class="table align-middle">
                <thead>
                <tr>
                    <th>Candidate</th>
                    <th>Score</th>
                    <th>Performance</th>
                    <th class="text-center"><i class="bi bi-stopwatch me-2"></i>Time Spent</th>
                    <th class="text-end">Submission Date</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="result : ${results}">
                    <td>
                        <div class="fw-bold" th:text="${result.student.fullName}">Student Name</div>
                        <small class="text-secondary" th:text="${result.student.username}">email@example.com</small>
                    </td>
                    <td>
                        <span class="raw-score fw-bold" th:text="${result.scoreAchieved}">0</span>
                        <span class="text-secondary">/ <span th:text="${result.totalMarks}">0</span></span>
                    </td>
                    <td>
                        <th:block th:if="${result.totalMarks > 0}" th:with="percentage=${(result.scoreAchieved * 100.0) / result.totalMarks}">
                            <div class="score-pill" th:classappend="${percentage >= 50 ? 'pill-pass' : 'pill-fail'}">
                                <span th:text="${#numbers.formatDecimal(percentage, 1, 1) + '%'}"></span>
                            </div>
                        </th:block>
                    </td>
                    <td class="text-center">
                        <span class="time-badge" th:text="${result.timeTaken != null ? result.timeTaken : '00:00'}">05:20</span>
                    </td>
                    <td class="text-end text-secondary small">
                        <div th:text="${#temporals.format(result.submissionTime, 'dd-MMM-yyyy')}">Date</div>
                        <div th:text="${#temporals.format(result.submissionTime, 'HH:mm')}">Time</div>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>

    <div class="mt-5">
        <a th:href="@{/admin/manage-exams}" class="btn-return"><i class="bi bi-arrow-left me-2"></i>Back</a>
    </div>
</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script>
    document.addEventListener('DOMContentLoaded', () => {
        const savedTheme = localStorage.getItem('theme') || 'dark';
        document.documentElement.setAttribute('data-bs-theme', savedTheme);
    });
</script>
</body>
</html>
