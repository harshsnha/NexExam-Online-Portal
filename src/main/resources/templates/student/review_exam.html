<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NexExam - Review Attempt</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">

    <style>
        :root {
            --primary-bg: #0f172a;
            --accent-color: #38bdf8;
            --text-main: #f8fafc;
            --text-sec: #94a3b8;
            --glass-bg: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
            --success-neon: #10b981;
            --danger-neon: #ef4444;
        }

        [data-bs-theme="light"] {
            --primary-bg: #f8fafc;
            --accent-color: #0284c7;
            --text-main: #1e293b;
            --text-sec: #64748b;
            --glass-bg: rgba(255, 255, 255, 0.85);
            --glass-border: rgba(15, 23, 42, 0.1);
        }

        body {
            background-color: var(--primary-bg);
            font-family: 'Plus Jakarta Sans', sans-serif;
            color: var(--text-main);
            min-height: 100vh;
            transition: all 0.4s ease;
        }

        .main-container { padding-top: 100px; padding-bottom: 50px; }

        .glass-header, .question-glass-card {
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 28px;
            color: var(--text-main);
            transition: 0.3s;
        }

        .glass-header { padding: 2.5rem; margin-bottom: 3rem; display: flex; justify-content: space-between; align-items: center; }
        .question-glass-card { padding: 2rem; margin-bottom: 2rem; }

        .q-header {
            border-bottom: 1px solid var(--glass-border);
            padding-bottom: 1rem; margin-bottom: 1.5rem;
            font-weight: 700; color: var(--accent-color);
            display: flex; justify-content: space-between;
        }

        .review-opt {
            padding: 1rem 1.5rem; border-radius: 15px; border: 1px solid var(--glass-border);
            margin-bottom: 12px; display: flex; align-items: center;
            background: rgba(var(--accent-color), 0.02); position: relative;
        }

        .opt-correct {
            background: rgba(16, 185, 129, 0.1) !important;
            border-color: var(--success-neon) !important;
        }
        .opt-correct::after {
            content: '✓ CORRECT';
            position: absolute; right: 15px; font-size: 0.7rem; font-weight: 800; color: var(--success-neon);
        }

        .opt-wrong {
            background: rgba(239, 68, 68, 0.1) !important;
            border-color: var(--danger-neon) !important;
        }
        .opt-wrong::after {
            content: '✕ YOUR ANSWER';
            position: absolute; right: 15px; font-size: 0.7rem; font-weight: 800; color: var(--danger-neon);
        }

        .opt-correct.opt-wrong {
            background: rgba(56, 189, 248, 0.1) !important;
            border-color: var(--accent-color) !important;
        }

        .opt-correct.opt-wrong::after {
            content: '✓ CORRECT & YOURS';
            color: var(--accent-color) !important;
        }

        .unanswered-tag {
            background: rgba(245, 158, 11, 0.1); color: #f59e0b;
            padding: 8px 15px; border-radius: 10px; font-size: 0.85rem;
            margin-top: 1rem; display: inline-block;
        }

        .orb { position: absolute; width: 400px; height: 400px; border-radius: 50%; filter: blur(120px); z-index: -1; opacity: 0.15; }
        .text-secondary { color: var(--text-sec) !important; }
    </style>
</head>
<body>

<div class="orb" style="background: var(--accent-color); top: 10%; left: -100px;"></div>
<div class="orb" style="background: #a855f7; bottom: 10%; right: -100px;"></div>

<div th:replace="~{fragments :: navbar}"></div>

<main class="container main-container">

    <div class="glass-header">
        <div>
            <h1 class="fw-bold mb-1" th:text="${exam.title}">Exam Review</h1>
            <p class="text-secondary mb-0"><i class="bi bi-clock-history me-2"></i>Post-Exam Breakdown & Analytics</p>
        </div>
        <div class="text-end">
            <span class="text-secondary small fw-bold d-block">FINAL SCORE</span>
            <div class="display-5 fw-bold"
                 th:style="|color: ${((result.scoreAchieved * 100.0) / result.totalMarks) >= 50 ? 'var(--success-neon)' : 'var(--danger-neon)'}|"
                 th:text="${result.scoreAchieved} + ' / ' + ${result.totalMarks}">
            </div>
        </div>
    </div>

    <div th:each="question, iter : ${questions}" class="question-glass-card">
        <div class="q-header">
            <span>QUESTION <span th:text="${iter.count}">1</span></span>
            <span class="text-secondary small" th:text="${question.marks} + ' Points'">2 Points</span>
        </div>

        <p class="fs-5 mb-4 fw-semibold" th:text="${question.text}">Question Statement</p>

        <th:block th:with="studentOpt=${studentAnswers.get(question.id)}">

            <div class="review-opt" th:classappend="${question.correctAnswer == 1 ? 'opt-correct' : ''} + ${studentOpt == 1 ? ' opt-wrong' : ''}">
                <input class="form-check-input me-3" type="radio" disabled th:checked="${studentOpt == 1}">
                <label class="w-100" th:text="${question.option1}">Option 1</label>
            </div>

            <div class="review-opt" th:classappend="${question.correctAnswer == 2 ? 'opt-correct' : ''} + ${studentOpt == 2 ? ' opt-wrong' : ''}">
                <input class="form-check-input me-3" type="radio" disabled th:checked="${studentOpt == 2}">
                <label class="w-100" th:text="${question.option2}">Option 2</label>
            </div>

            <div class="review-opt" th:classappend="${question.correctAnswer == 3 ? 'opt-correct' : ''} + ${studentOpt == 3 ? ' opt-wrong' : ''}">
                <input class="form-check-input me-3" type="radio" disabled th:checked="${studentOpt == 3}">
                <label class="w-100" th:text="${question.option3}">Option 3</label>
            </div>

            <div class="review-opt" th:classappend="${question.correctAnswer == 4 ? 'opt-correct' : ''} + ${studentOpt == 4 ? ' opt-wrong' : ''}">
                <input class="form-check-input me-3" type="radio" disabled th:checked="${studentOpt == 4}">
                <label class="w-100" th:text="${question.option4}">Option 4</label>
            </div>

            <div th:if="${studentOpt == 0 or studentOpt == null}" class="unanswered-tag">
                <i class="bi bi-info-circle me-2"></i>Not Attempted
            </div>

        </th:block>
    </div>

    <div class="text-center mt-5 pt-3">
        <a th:href="@{/student/my-results}" class="btn btn-outline-info rounded-pill px-5 py-2 fw-bold">
            <i class="bi bi-arrow-left me-2"></i>Back to Results
        </a>
    </div>
</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script>
    document.addEventListener('DOMContentLoaded', () => {
        const savedTheme = localStorage.getItem('theme') || 'dark';
        document.documentElement.setAttribute('data-bs-theme', savedTheme);
    });
</script>
</body>
</html>
