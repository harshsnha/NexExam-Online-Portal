<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Exam History - NexExam</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-bg: #0f172a; --accent-color: #38bdf8; --text-main: #f8fafc;
            --text-sec: #94a3b8; --glass-bg: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1); --card-hover: rgba(56, 189, 248, 0.1);
        }
        [data-bs-theme="light"] {
            --primary-bg: #f8fafc; --accent-color: #0284c7; --text-main: #1e293b;
            --text-sec: #64748b; --glass-bg: rgba(15, 23, 42, 0.05);
            --glass-border: rgba(15, 23, 42, 0.1); --card-hover: rgba(2, 132, 199, 0.08);
        }
        body { background-color: var(--primary-bg) !important; font-family: 'Plus Jakarta Sans', sans-serif; color: var(--text-main) !important; min-height: 100vh; transition: all 0.4s ease; }
        .main-container { padding-top: 100px; padding-bottom: 50px; }
        .result-card { background: var(--glass-bg) !important; backdrop-filter: blur(15px); border: 1px solid var(--glass-border) !important; border-radius: 24px; transition: all 0.4s ease; color: var(--text-main) !important; }
        .result-card:hover { transform: translateY(-10px); border-color: var(--accent-color) !important; }
        .score-display { background: rgba(255, 255, 255, 0.03); border-radius: 20px; padding: 20px; margin: 1.5rem 0; border: 1px solid var(--glass-border); }
        .score-percent { font-size: 2.2rem; font-weight: 800; line-height: 1; margin-bottom: 5px; }
        .btn-review { background: rgba(56, 189, 248, 0.1); color: var(--accent-color) !important; font-weight: 700; border-radius: 12px; padding: 12px; border: 1px solid var(--accent-color); transition: 0.3s; text-decoration: none; display: block; text-align: center; }
        .btn-review:hover { background: var(--accent-color); color: white !important; }
        .btn-cert { background: #10b981; color: white !important; font-weight: 700; border-radius: 12px; padding: 12px; border: none; display: block; text-align: center; margin-top: 10px; text-decoration: none; transition: 0.3s; }
        .orb { position: absolute; width: 400px; height: 400px; border-radius: 50%; filter: blur(120px); z-index: -1; opacity: 0.15; }
    </style>
</head>
<body>
<div class="orb" style="background: var(--accent-color); top: 10%; left: -100px;"></div>
<div th:replace="~{fragments :: navbar}"></div>
<div class="container main-container">
    <div class="d-flex align-items-center mb-5">
        <div class="p-3 rounded-4 bg-primary bg-opacity-10 me-3 text-info">
            <i class="bi bi-clock-history fs-1"></i>
        </div>
        <div>
            <h2 class="fw-bold mb-0">My Exam <span style="color: var(--accent-color);">History</span></h2>
            <p class="text-secondary mb-0">Review your performance and certificates.</p>
        </div>
    </div>
    <div th:if="${#lists.isEmpty(pastResults)}" class="text-center py-5">
        <div class="mb-4"><i class="bi bi-journal-x fs-1 text-secondary"></i></div>
        <h4 class="text-secondary">No exam records found.</h4>
        <a th:href="@{/student/dashboard}" class="btn btn-outline-info mt-3 rounded-pill px-4">Take your first exam</a>
    </div>
    <div class="row g-4" th:if="${not #lists.isEmpty(pastResults)}">
        <div class="col-md-6 col-lg-4" th:each="result : ${pastResults}">
            <div class="card result-card h-100">
                <div class="card-body d-flex flex-column p-4">
                    <div class="d-flex justify-content-between align-items-start mb-2">
                        <div>
                            <h5 class="fw-bold mb-1" th:text="${result.exam.title}" style="color: var(--text-main);">Exam Name</h5>
                            <small class="text-secondary">
                                <i class="bi bi-calendar-event me-1"></i>
                                <span th:text="${#temporals.format(result.submissionTime, 'dd MMM yyyy')}">Date</span>
                            </small>
                        </div>
                        <th:block th:with="pct=${result.totalMarks > 0 ? (result.scoreAchieved * 100.0) / result.totalMarks : 0}">
                            <span th:class="${pct >= 30 ? 'badge bg-success' : 'badge bg-danger'}" th:text="${pct >= 30 ? 'PASSED' : 'FAILED'}"></span>
                        </th:block>
                    </div>
                    <div class="text-center score-display">
                        <th:block th:with="percentage=${result.totalMarks > 0 ? (result.scoreAchieved * 100.0) / result.totalMarks : 0}">
                            <div class="score-percent" th:style="${percentage >= 30 ? 'color: #10b981' : 'color: #ef4444'}" th:text="${#numbers.formatDecimal(percentage, 1, 1) + '%'}"></div>
                            <div class="text-secondary small" th:text="|${result.scoreAchieved} / ${result.totalMarks} Marks|"></div>
                        </th:block>
                    </div>
                    <a th:href="@{/student/dashboard}" class="btn btn-review"><i class="bi bi-arrow-repeat me-2"></i>Go to Dashboard</a>
                    <a th:if="${result.totalMarks > 0 and (result.scoreAchieved * 100.0 / result.totalMarks) >= 30}" th:href="@{/student/certificate/{id}(id=${result.id})}" class="btn btn-cert"><i class="bi bi-patch-check me-2"></i>View Certificate</a>
                </div>
            </div>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script>
    document.addEventListener('DOMContentLoaded', () => {
        const savedTheme = localStorage.getItem('theme') || 'dark';
        document.documentElement.setAttribute('data-bs-theme', savedTheme);
    });
</script>
</body>
</html>
