<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Profile - NexExam</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">

    <style>
        :root {
            --primary-bg: #0f172a;
            --accent-color: #38bdf8;
            --text-main: #f8fafc;
            --text-sec: #94a3b8;
            --glass-bg: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
            --input-bg: rgba(255, 255, 255, 0.03);
        }

        [data-bs-theme="light"] {
            --primary-bg: #f8fafc;
            --accent-color: #0284c7;
            --text-main: #1e293b;
            --text-sec: #64748b;
            --glass-bg: rgba(255, 255, 255, 0.8);
            --glass-border: rgba(15, 23, 42, 0.1);
            --input-bg: rgba(15, 23, 42, 0.03);
        }

        body {
            background-color: var(--primary-bg);
            font-family: 'Plus Jakarta Sans', sans-serif;
            color: var(--text-main);
            min-height: 100vh;
            transition: background 0.4s ease, color 0.4s ease;
        }

        .main-container { padding-top: 100px; padding-bottom: 50px; }

        .glass-card {
            background: var(--glass-bg);
            backdrop-filter: blur(15px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 2rem;
            height: 100%;
            color: var(--text-main);
        }

        .profile-pic-container {
            position: relative;
            width: 160px;
            height: 160px;
            margin: 0 auto 1.5rem;
        }

        .profile-pic-lg {
            width: 100%; height: 100%;
            border-radius: 50%; object-fit: cover;
            border: 4px solid var(--accent-color);
            box-shadow: 0 0 20px rgba(56, 189, 248, 0.2);
        }

        .form-label { font-weight: 600; color: var(--text-sec); font-size: 0.85rem; }

        .form-control {
            background: var(--input-bg);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            color: var(--text-main) !important;
            padding: 0.75rem 1rem;
        }

        .btn-modern { border-radius: 12px; padding: 10px 20px; font-weight: 700; transition: 0.3s; border: none; }
        .btn-update { background: var(--accent-color); color: white; }
        .btn-update:hover { opacity: 0.9; transform: translateY(-2px); }

        .btn-password { background: rgba(245, 158, 11, 0.15); color: #f59e0b; border: 1px solid rgba(245, 158, 11, 0.3); }
        .btn-remove { background: rgba(239, 68, 68, 0.1); color: #ef4444; border: 1px solid rgba(239, 68, 68, 0.2); margin-top: 10px; }

        .orb {
            position: absolute; width: 400px; height: 400px; border-radius: 50%;
            filter: blur(120px); z-index: -1; opacity: 0.15;
        }
    </style>
</head>
<body>

<div class="orb" style="background: var(--accent-color); top: 10%; right: 0;"></div>
<div class="orb" style="background: #a855f7; bottom: 10%; left: 0;"></div>

<div th:replace="~{fragments :: navbar}"></div>

<div class="container main-container">
    <div th:if="${successMessage}" class="alert alert-success alert-dismissible fade show border-0 bg-success bg-opacity-10 text-success mb-4 rounded-4">
        <i class="bi bi-check-circle-fill me-2"></i> <span th:text="${successMessage}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>

    <div class="row g-4">
        <div class="col-lg-4">
            <div class="glass-card text-center">
                <div class="profile-pic-container">
                    <img th:if="${student.profilePicUrl != null}" th:src="@{${student.profilePicUrl}}" class="profile-pic-lg">
                    <div th:if="${student.profilePicUrl == null}" class="profile-pic-lg bg-info bg-opacity-10 d-flex align-items-center justify-content-center">
                        <i class="bi bi-person fs-1 text-info"></i>
                    </div>
                </div>

                <h3 class="fw-bold mb-1" th:text="${student.fullName}">Student Name</h3>
                <p class="text-secondary small mb-4" th:text="${student.username}">email@example.com</p>

                <hr class="opacity-10 mb-4">

                <form th:action="@{/student/profile/update-picture}" method="post" enctype="multipart/form-data">
                    <div class="mb-3">
                        <input type="file" class="form-control form-control-sm" id="profilePicFile" name="profilePicFile" accept="image/*" required>
                    </div>
                    <button type="submit" class="btn btn-modern btn-update w-100">
                        <i class="bi bi-cloud-arrow-up me-2"></i>Upload New
                    </button>
                </form>

                <form th:if="${student.profilePicUrl != null}" th:action="@{/student/profile/remove-picture}" method="post">
                    <button type="submit" class="btn btn-modern btn-remove w-100" onclick="return confirm('Remove profile picture?')">
                        <i class="bi bi-trash3 me-2"></i>Remove Photo
                    </button>
                </form>
            </div>
        </div>

        <div class="col-lg-8">
            <div class="glass-card mb-4">
                <h4 class="fw-bold mb-4"><i class="bi bi-person-gear me-2 text-info"></i>Profile Details</h4>
                <form th:action="@{/student/profile/update-details}" th:object="${student}" method="post">
                    <div class="row">
                        <div class="col-md-12 mb-3">
                            <label class="form-label">Full Name</label>
                            <input type="text" class="form-control" th:field="*{fullName}" required>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Email (Immutable)</label>
                            <input type="email" class="form-control" th:field="*{username}" readonly disabled>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Contact Number</label>
                            <input type="tel" class="form-control" th:field="*{mobileNumber}">
                        </div>
                    </div>
                    <button type="submit" class="btn btn-modern btn-update mt-2">Save Changes</button>
                </form>
            </div>

            <div class="glass-card">
                <h4 class="fw-bold mb-4"><i class="bi bi-shield-lock me-2 text-warning"></i>Security Settings</h4>
                <form th:action="@{/student/profile/update-password}" method="post">
                    <div class="row">
                        <div class="col-md-12 mb-3">
                            <label class="form-label">Current Password</label>
                            <input type="password" class="form-control" name="oldPassword" required>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label class="form-label">New Password</label>
                            <input type="password" class="form-control" name="newPassword" required>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Confirm New Password</label>
                            <input type="password" class="form-control" name="confirmPassword" required>
                        </div>
                    </div>
                    <button type="submit" class="btn btn-modern btn-password mt-2">Update Password</button>
                </form>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script>
    document.addEventListener('DOMContentLoaded', () => {
        const savedTheme = localStorage.getItem('theme') || 'dark';
        document.documentElement.setAttribute('data-bs-theme', savedTheme);
    });
</script>
</body>
</html>
