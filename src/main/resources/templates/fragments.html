<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<body>

<nav th:fragment="navbar" class="navbar navbar-expand-lg fixed-top navbar-glass">
    <style>
        :root {
            --nav-bg: rgba(15, 23, 42, 0.85);
            --text-color: #cbd5e1;
            --brand-color: #38bdf8;
            --dropdown-bg: rgba(30, 41, 59, 0.98);
            --border-color: rgba(255, 255, 255, 0.1);
        }

        [data-bs-theme="light"] {
            --nav-bg: rgba(255, 255, 255, 0.85);
            --text-color: #334155;
            --brand-color: #0284c7;
            --dropdown-bg: rgba(255, 255, 255, 0.98);
            --border-color: rgba(0, 0, 0, 0.1);
        }

        .navbar-glass {
            background: var(--nav-bg) !important;
            backdrop-filter: blur(12px) saturate(180%);
            -webkit-backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--border-color);
            transition: background 0.4s ease, border 0.4s ease;
            z-index: 1100;
        }

        .navbar-brand {
            font-weight: 800;
            background: linear-gradient(to right, var(--brand-color), #94a3b8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-size: 1.4rem;
        }

        .nav-link {
            font-weight: 500;
            color: var(--text-color) !important;
            transition: all 0.3s ease;
            border-radius: 8px;
            margin: 0 2px;
        }

        .nav-link:hover {
            color: var(--brand-color) !important;
            background: rgba(56, 189, 248, 0.1);
        }

        .action-dropdown .dropdown-toggle::after { display: none; }
        .action-btn {
            background: rgba(56, 189, 248, 0.1);
            color: var(--brand-color) !important;
            border: 1px solid rgba(56, 189, 248, 0.2);
            font-weight: 700 !important;
        }

        .theme-toggle-btn {
            background: none; border: none; color: var(--text-color);
            font-size: 1.2rem; cursor: pointer; padding: 8px;
            border-radius: 50%; transition: 0.3s;
            display: flex; align-items: center; justify-content: center;
        }

        .navbar-profile-pic {
            width: 35px; height: 35px; border-radius: 50%;
            object-fit: cover; border: 2px solid var(--brand-color);
        }

        .dropdown-menu {
            background: var(--dropdown-bg);
            backdrop-filter: blur(15px);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 0.5rem;
            margin-top: 10px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            z-index: 2000;
        }

        .dropdown-item {
            color: var(--text-color) !important;
            border-radius: 8px;
            padding: 0.6rem 1rem;
            transition: 0.2s;
        }

        .role-indicator {
            font-size: 0.65rem;
            background: rgba(56, 189, 248, 0.15);
            color: var(--brand-color);
            padding: 2px 8px;
            border-radius: 20px;
            text-transform: uppercase;
            font-weight: 700;
        }

        /* Standalone Logout Button Style */
        .btn-logout-nav {
            background: rgba(239, 68, 68, 0.1);
            color: #ef4444 !important;
            border: 1px solid rgba(239, 68, 68, 0.2);
            font-weight: 700;
            transition: 0.3s;
            padding: 6px 15px;
            border-radius: 50px;
        }
        .btn-logout-nav:hover {
            background: #ef4444;
            color: white !important;
            transform: scale(1.05);
        }
    </style>

    <div class="container">
        <a class="navbar-brand d-flex align-items-center" th:href="@{/}">
            <i class="bi bi-mortarboard-fill me-2" style="color: var(--brand-color);"></i>
            NexExam
        </a>

        <button class="navbar-toggler border-0 shadow-none" type="button" data-bs-toggle="collapse" data-bs-target="#navbarSupportedContent">
            <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="navbarSupportedContent">
            <ul class="navbar-nav me-auto mb-2 mb-lg-0 ms-lg-4">
                <li class="nav-item"><a class="nav-link" th:href="@{/}"><i class="bi bi-house-door me-1"></i> Home</a></li>

                <th:block sec:authorize="hasRole('ADMIN')">
                    <li class="nav-item"><a class="nav-link" th:href="@{/admin/dashboard}"><i class="bi bi-speedometer2 me-1"></i> Dashboard</a></li>
                    <li class="nav-item dropdown action-dropdown mx-1">
                        <a class="nav-link action-btn dropdown-toggle rounded-pill px-3" href="#" role="button" data-bs-toggle="dropdown">
                            <i class="bi bi-lightning-charge-fill me-1"></i> Actions
                        </a>
                        <ul class="dropdown-menu border-0 shadow">
                            <li><a class="dropdown-item" th:href="@{/admin/exam/add}"><i class="bi bi-plus-circle me-2 text-info"></i> New Exam</a></li>
                            <li><a class="dropdown-item" th:href="@{/admin/manage-exams}"><i class="bi bi-pencil-square me-2 text-warning"></i> Manage Exams</a></li>
                            <li><a class="dropdown-item" th:href="@{/admin/students}"><i class="bi bi-people-fill me-2 text-success"></i> Manage Students</a></li>
                            <li><hr class="dropdown-divider opacity-10"></li>
                            <li><a class="dropdown-item" th:href="@{/admin/rankings}"><i class="bi bi-trophy me-2 text-primary"></i> Rankings</a></li>
                        </ul>
                    </li>
                </th:block>

                <th:block sec:authorize="hasRole('STUDENT')">
                    <li class="nav-item"><a class="nav-link" th:href="@{/student/dashboard}"><i class="bi bi-journal-check me-1"></i> My Portal</a></li>
                    <li class="nav-item"><a class="nav-link" th:href="@{/student/my-results}"><i class="bi bi-patch-check me-1"></i> Certificates</a></li>
                </th:block>
            </ul>

            <ul class="navbar-nav ms-auto align-items-center">
                <li class="nav-item me-2">
                    <button class="theme-toggle-btn" id="themeSwitcher">
                        <i class="bi bi-moon-stars-fill" id="themeIcon"></i>
                    </button>
                </li>

                <li class="nav-item" sec:authorize="!isAuthenticated()">
                    <a class="nav-link px-3 rounded-pill border border-info border-opacity-25" th:href="@{/login}">Login</a>
                </li>

                <li class="nav-item d-flex align-items-center" sec:authorize="isAuthenticated()">
                    <a th:href="${#authorization.expression('hasRole(''STUDENT'')') ? '/student/profile' : '#'}"
                       class="text-decoration-none d-flex align-items-center me-3 border-end pe-3 border-secondary border-opacity-25">
                        <div class="position-relative d-flex align-items-center">
                            <img th:if="${globalProfilePicUrl != null and !#strings.isEmpty(globalProfilePicUrl)}" th:src="@{${globalProfilePicUrl}}" class="navbar-profile-pic">
                            <i th:if="${globalProfilePicUrl == null or #strings.isEmpty(globalProfilePicUrl)}" class="bi bi-person-circle fs-4 text-info"></i>
                        </div>
                        <div class="ms-2 d-none d-lg-block text-start">
                            <div class="small fw-bold" style="color: var(--text-color); line-height: 1;" sec:authentication="name">User</div>
                            <span class="role-indicator">
                                <span sec:authorize="hasRole('ADMIN')">Admin</span>
                                <span sec:authorize="hasRole('STUDENT')">Student</span>
                            </span>
                        </div>
                    </a>

                    <button class="btn btn-logout-nav d-flex align-items-center" onclick="document.getElementById('logoutForm').submit();">
                        <i class="bi bi-box-arrow-right me-2"></i> Logout
                    </button>
                    <form th:action="@{/logout}" method="post" id="logoutForm" class="d-none"></form>
                </li>
            </ul>
        </div>
    </div>

    <script>
        (function() {
            const switcher = document.getElementById('themeSwitcher');
            const icon = document.getElementById('themeIcon');
            const html = document.documentElement;
            const savedTheme = localStorage.getItem('theme') || 'dark';
            html.setAttribute('data-bs-theme', savedTheme);
            updateUI(savedTheme);

            switcher.addEventListener('click', () => {
                const currentTheme = html.getAttribute('data-bs-theme');
                const newTheme = currentTheme === 'dark' ? 'light' : 'dark';
                html.setAttribute('data-bs-theme', newTheme);
                localStorage.setItem('theme', newTheme);
                updateUI(newTheme);
            });

            function updateUI(theme) {
                if (theme === 'light') {
                    icon.classList.replace('bi-moon-stars-fill', 'bi-sun-fill');
                    icon.style.color = '#f59e0b';
                } else {
                    icon.classList.replace('bi-sun-fill', 'bi-moon-stars-fill');
                    icon.style.color = '#38bdf8';
                }
            }
        })();
    </script>
</nav>

</body>
</html>
